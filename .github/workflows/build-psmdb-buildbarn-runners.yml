name: build-psmdb-buildbarn-runners

# Builds the PSMDB RBE runner images on GHCR as multi-arch manifest lists.
#
# Shape (Docker docs "distribute build across multiple runners"
# https://docs.docker.com/build/ci/github-actions/multi-platform/):
#
#   1. `build` matrix → 36 jobs: psmdb_version × distro × platform (3×6×2),
#      no excludes — every distro is built for both linux/amd64 and linux/arm64.
#      Each job builds its single-arch image, pushes it to GHCR by-digest only
#      (no tag yet) and uploads the sha256 digest as a workflow artifact.
#   2. `merge` matrix → 18 jobs: psmdb_version × distro. Downloads the per-arch
#      digest artifacts for one (version, distro) pair and stitches them into a
#      single multi-arch tag with `docker buildx imagetools create`.
#   3. `report` aggregates build + merge into one status check suitable for
#      branch protection.
#
# Image naming on GHCR (lowercased owner; one image per distro, no arch suffix):
#   ghcr.io/<owner>/psmdb-buildbarn-runners/<distro>:<version>-<sha>   (immutable)
#   ghcr.io/<owner>/psmdb-buildbarn-runners/<distro>:<version>          (moving)
#
# Per-arch Dockerfiles live under
#   IaC/buildbarn/runners/<distro>-x86_64/Dockerfile
#   IaC/buildbarn/runners/<distro>-aarch64/Dockerfile
# (they only differ in LABEL metadata; the build body is identical). Keeping
# both dirs as-is gives a clean checkout-and-build per arch with no Dockerfile
# munging — deduplicating is out of scope for this PR.
#
# debian-bookworm is now multi-arch like the other 5 distros (the previous
# amd64-only carve-out was removed once `debian-bookworm-aarch64/` was added
# alongside `-x86_64/`).
#
# Routing-key implication on the PSMDB Bazel side: each distro now resolves to
# ONE multi-arch URL in psmdb_rbe_containers.bzl. The arch dimension is no
# longer carried in the image name; it lives only in the `Pool` exec property
# (see PSMDB v8.0 bazel/platforms/{platform_util,local_config_platform}.bzl),
# which is what routes a worker request to the matching native-arch BuildBarn
# worker pool.
#
# Native ARM is preserved: linux/arm64 build matrix entries pin
# runs_on: ubuntu-24.04-arm to avoid 10–20× QEMU emulation overhead. If those
# runners ever become unavailable, swap to ubuntu-24.04 + docker/setup-qemu
# at the build job level only (merge stays unchanged).

on:
  workflow_dispatch:
    inputs:
      distros:
        description: "Subset of distros to build (space-separated; empty = all)"
        required: false
        default: ""
      versions:
        description: "Subset of PSMDB release lines to build (space-separated: 8.0 8.3 master; empty = all)"
        required: false
        default: ""
      push_moving:
        description: "Also push the :<version> moving tag (disable for isolated branch experiments)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mongo_repo:
        description: "mongo repo URL (default: https://github.com/vorsel/percona-server-mongodb.git)"
        required: false
        default: ""
      mongo_branch_master:
        description: "Override mongo branch for psmdb_version=master (default: master)"
        required: false
        default: ""
      mongo_branch_v83:
        description: "Override mongo branch for psmdb_version=8.3 (default: v8.3)"
        required: false
        default: ""
      mongo_branch_v80:
        description: "Override mongo branch for psmdb_version=8.0 (default: v8.0)"
        required: false
        default: ""
  push:
    branches:
      - PSMDB-2034_buildbarn_setup
    paths:
      - "IaC/buildbarn/runners/**"
      - ".github/workflows/build-psmdb-buildbarn-runners.yml"
  schedule:
    # Weekly rebuild to pick up upstream CVE updates in base images and any
    # drift in psmdb_builder_<version>.sh install_deps() — Mondays 03:00 UTC.
    - cron: "0 3 * * 1"

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: psmdb-buildbarn-runners

jobs:
  build:
    name: build ${{ matrix.distro }}/${{ matrix.platform_pair }} (psmdb-${{ matrix.psmdb_version }})
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    # Serialize per (version, distro, platform) cell — protects against
    # simultaneous workflow_dispatch + cron firing for the same target,
    # while keeping different cells parallel up to `max-parallel: 10`.
    concurrency:
      group: build-psmdb-buildbarn-runners-${{ matrix.psmdb_version }}-${{ matrix.distro }}-${{ matrix.platform_pair }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        # Cartesian product of psmdb_version × distro × platform = 6×3×2 = 36.
        # The `include` entries below add per-platform attributes
        # (arch_suffix, runs_on, platform_pair); they do NOT introduce new
        # combinations.
        psmdb_version:
          - "8.0"
          - "8.3"
          - "master"
        distro:
          - oraclelinux-8
          - oraclelinux-9
          - amazonlinux-2023
          - ubuntu-jammy
          - ubuntu-noble
          - debian-bookworm
        platform:
          - linux/amd64
          - linux/arm64
        include:
          - platform: linux/amd64
            arch_suffix: x86_64
            runs_on: ubuntu-24.04
            platform_pair: linux-amd64
          - platform: linux/arm64
            arch_suffix: aarch64
            runs_on: ubuntu-24.04-arm
            platform_pair: linux-arm64

    steps:
      - name: Skip if distro or version filtered out
        id: filter
        shell: bash
        env:
          DISTROS_FILTER: ${{ github.event.inputs.distros }}
          VERSIONS_FILTER: ${{ github.event.inputs.versions }}
          THIS_DISTRO: ${{ matrix.distro }}
          THIS_VERSION: ${{ matrix.psmdb_version }}
        run: |
          # Distro filter
          if [[ -n "${DISTROS_FILTER}" ]]; then
            hit="false"
            for v in ${DISTROS_FILTER}; do
              if [[ "${v}" == "${THIS_DISTRO}" ]]; then hit="true"; break; fi
            done
            if [[ "${hit}" == "false" ]]; then
              echo "distro ${THIS_DISTRO} not in distros filter [${DISTROS_FILTER}], skipping"
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Version filter
          if [[ -n "${VERSIONS_FILTER}" ]]; then
            hit="false"
            for v in ${VERSIONS_FILTER}; do
              if [[ "${v}" == "${THIS_VERSION}" ]]; then hit="true"; break; fi
            done
            if [[ "${hit}" == "false" ]]; then
              echo "version ${THIS_VERSION} not in versions filter [${VERSIONS_FILTER}], skipping"
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.filter.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.filter.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.filter.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.filter.outputs.run == 'true'
        id: meta
        shell: bash
        env:
          PSMDB_VERSION: ${{ matrix.psmdb_version }}
          MONGO_REPO_INPUT: ${{ github.event.inputs.mongo_repo }}
          MONGO_BRANCH_MASTER_INPUT: ${{ github.event.inputs.mongo_branch_master }}
          MONGO_BRANCH_V83_INPUT: ${{ github.event.inputs.mongo_branch_v83 }}
          MONGO_BRANCH_V80_INPUT: ${{ github.event.inputs.mongo_branch_v80 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GHCR paths must be lowercase; repo owners like "Percona" would
          # otherwise cause 400 at push time.
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAMESPACE}/${{ matrix.distro }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "cache_bust=$(date +%s)" >> "$GITHUB_OUTPUT"

          # Resolve mongo branch — psmdb_version → default with optional override.
          case "${PSMDB_VERSION}" in
            8.0)    DEFAULT_BRANCH=v8.0;   OVERRIDE="${MONGO_BRANCH_V80_INPUT}" ;;
            8.3)    DEFAULT_BRANCH=v8.3;   OVERRIDE="${MONGO_BRANCH_V83_INPUT}" ;;
            master) DEFAULT_BRANCH=master; OVERRIDE="${MONGO_BRANCH_MASTER_INPUT}" ;;
            *) echo "unknown psmdb_version: ${PSMDB_VERSION}" >&2; exit 1 ;;
          esac
          MONGO_BRANCH="${OVERRIDE:-$DEFAULT_BRANCH}"
          echo "mongo_branch=${MONGO_BRANCH}" >> "$GITHUB_OUTPUT"

          # Resolve mongo repo (default: vorsel fork; override via workflow_dispatch input).
          MONGO_REPO="${MONGO_REPO_INPUT:-https://github.com/vorsel/percona-server-mongodb.git}"
          echo "mongo_repo=${MONGO_REPO}" >> "$GITHUB_OUTPUT"

          # Resolve last-script-touch SHA via GitHub commits API (public repo, no auth).
          # Returns SHA of the most recent commit on $MONGO_BRANCH that touched the
          # script file. Stays constant while the branch advances on commits that
          # don't touch psmdb_builder.sh — this is the image tag's identity SHA.
          MONGO_OWNER_REPO=$(echo "${MONGO_REPO}" | sed -re 's|.*github.com[:/]([^/]+/[^/]+)\.git|\1|')
          # Authenticated call (Authorization: Bearer ${GITHUB_TOKEN}) bumps the
          # GitHub API rate limit from 60/hr per shared-runner IP (anonymous) to
          # 1000/hr per workflow token. --retry 3 absorbs transient 5xx hiccups.
          SHA=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            --retry 3 --retry-delay 2 \
            "https://api.github.com/repos/${MONGO_OWNER_REPO}/commits?path=percona-packaging/scripts/psmdb_builder.sh&sha=${MONGO_BRANCH}&per_page=1" \
            | jq -r '.[0].sha')
          if [[ -z "${SHA}" || "${SHA}" == "null" ]]; then
            echo "Failed to resolve last-script-touch SHA for ${MONGO_OWNER_REPO}@${MONGO_BRANCH}" >&2
            exit 1
          fi
          echo "mongo_sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved mongo_branch=${MONGO_BRANCH} mongo_sha=${SHA}"

      - name: Build and push by digest
        if: steps.filter.outputs.run == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: IaC/buildbarn/runners/${{ matrix.distro }}-${{ matrix.arch_suffix }}
          file: IaC/buildbarn/runners/${{ matrix.distro }}-${{ matrix.arch_suffix }}/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ steps.meta.outputs.image }},push-by-digest=true,name-canonical=true,push=${{ github.event_name != 'pull_request' }}
          build-args: |
            MONGO_REPO=${{ steps.meta.outputs.mongo_repo }}
            MONGO_BRANCH=${{ steps.meta.outputs.mongo_branch }}
            PSMDB_VERSION=${{ matrix.psmdb_version }}
            CACHE_BUST=${{ steps.meta.outputs.cache_bust }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.percona.psmdb.version=${{ matrix.psmdb_version }}
            org.percona.psmdb.mongo_repo=${{ steps.meta.outputs.mongo_repo }}
            org.percona.psmdb.mongo_branch=${{ steps.meta.outputs.mongo_branch }}
            org.percona.psmdb.mongo_sha=${{ steps.meta.outputs.mongo_sha }}

      - name: Export digest
        if: steps.filter.outputs.run == 'true' && github.event_name != 'pull_request'
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          if [[ -z "${digest}" ]]; then
            echo "build-push-action produced no digest" >&2
            exit 1
          fi
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        if: steps.filter.outputs.run == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.distro }}-${{ matrix.psmdb_version }}-${{ matrix.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: merge ${{ matrix.distro }} (psmdb-${{ matrix.psmdb_version }})
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    # Serialize per (version, distro) — manifest-list creation is fast enough that
    # cross-platform contention isn't an issue here (the merge job doesn't include
    # platform in its matrix).
    concurrency:
      group: merge-psmdb-buildbarn-runners-${{ matrix.psmdb_version }}-${{ matrix.distro }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        psmdb_version:
          - "8.0"
          - "8.3"
          - "master"
        distro:
          - oraclelinux-8
          - oraclelinux-9
          - amazonlinux-2023
          - ubuntu-jammy
          - ubuntu-noble
          - debian-bookworm

    steps:
      - name: Skip if distro or version filtered out
        id: filter
        shell: bash
        env:
          DISTROS_FILTER: ${{ github.event.inputs.distros }}
          VERSIONS_FILTER: ${{ github.event.inputs.versions }}
          THIS_DISTRO: ${{ matrix.distro }}
          THIS_VERSION: ${{ matrix.psmdb_version }}
        run: |
          if [[ -n "${DISTROS_FILTER}" ]]; then
            hit="false"
            for v in ${DISTROS_FILTER}; do
              if [[ "${v}" == "${THIS_DISTRO}" ]]; then hit="true"; break; fi
            done
            if [[ "${hit}" == "false" ]]; then
              echo "distro ${THIS_DISTRO} not in distros filter [${DISTROS_FILTER}], skipping"
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          if [[ -n "${VERSIONS_FILTER}" ]]; then
            hit="false"
            for v in ${VERSIONS_FILTER}; do
              if [[ "${v}" == "${THIS_VERSION}" ]]; then hit="true"; break; fi
            done
            if [[ "${hit}" == "false" ]]; then
              echo "version ${THIS_VERSION} not in versions filter [${VERSIONS_FILTER}], skipping"
              echo "run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Download digests
        if: steps.filter.outputs.run == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.distro }}-${{ matrix.psmdb_version }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        if: steps.filter.outputs.run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.filter.outputs.run == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        if: steps.filter.outputs.run == 'true'
        id: meta
        shell: bash
        env:
          PSMDB_VERSION: ${{ matrix.psmdb_version }}
          MONGO_REPO_INPUT: ${{ github.event.inputs.mongo_repo }}
          MONGO_BRANCH_MASTER_INPUT: ${{ github.event.inputs.mongo_branch_master }}
          MONGO_BRANCH_V83_INPUT: ${{ github.event.inputs.mongo_branch_v83 }}
          MONGO_BRANCH_V80_INPUT: ${{ github.event.inputs.mongo_branch_v80 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="${REGISTRY}/${OWNER}/${IMAGE_NAMESPACE}/${{ matrix.distro }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # Resolve mongo branch (with optional per-version override) — same logic
          # as in `build` job. Re-resolved here instead of plumbed via artifact so
          # the merge job stays standalone; race between build start and merge
          # start is in seconds and acceptable for tagging purposes.
          case "${PSMDB_VERSION}" in
            8.0)    DEFAULT_BRANCH=v8.0;   OVERRIDE="${MONGO_BRANCH_V80_INPUT}" ;;
            8.3)    DEFAULT_BRANCH=v8.3;   OVERRIDE="${MONGO_BRANCH_V83_INPUT}" ;;
            master) DEFAULT_BRANCH=master; OVERRIDE="${MONGO_BRANCH_MASTER_INPUT}" ;;
            *) echo "unknown psmdb_version: ${PSMDB_VERSION}" >&2; exit 1 ;;
          esac
          MONGO_BRANCH="${OVERRIDE:-$DEFAULT_BRANCH}"
          MONGO_REPO="${MONGO_REPO_INPUT:-https://github.com/vorsel/percona-server-mongodb.git}"
          MONGO_OWNER_REPO=$(echo "${MONGO_REPO}" | sed -re 's|.*github.com[:/]([^/]+/[^/]+)\.git|\1|')
          # Authenticated call (Authorization: Bearer ${GITHUB_TOKEN}) bumps the
          # GitHub API rate limit from 60/hr per shared-runner IP (anonymous) to
          # 1000/hr per workflow token. --retry 3 absorbs transient 5xx hiccups.
          SHA=$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            --retry 3 --retry-delay 2 \
            "https://api.github.com/repos/${MONGO_OWNER_REPO}/commits?path=percona-packaging/scripts/psmdb_builder.sh&sha=${MONGO_BRANCH}&per_page=1" \
            | jq -r '.[0].sha')
          if [[ -z "${SHA}" || "${SHA}" == "null" ]]; then
            echo "Failed to resolve last-script-touch SHA for ${MONGO_OWNER_REPO}@${MONGO_BRANCH}" >&2
            exit 1
          fi
          echo "mongo_sha=${SHA}" >> "$GITHUB_OUTPUT"

          # Tag set:
          #   :<version>-<mongo-sha> — immutable, for production worker pinning
          #   :<version>             — moving alias, for dev iteration (default on)
          # Disable the moving tag with push_moving=false for isolated branch
          # experiments that must not overwrite the current :<version> pointer.
          IMMUTABLE="${IMAGE}:${PSMDB_VERSION}-${SHA}"
          MOVING="${IMAGE}:${PSMDB_VERSION}"
          TAGS="${IMMUTABLE}"
          PUSH_MOVING="${{ github.event.inputs.push_moving }}"
          if [[ -z "${PUSH_MOVING}" || "${PUSH_MOVING}" == "true" ]]; then
            TAGS="${TAGS}"$'\n'"${MOVING}"
          fi
          echo "immutable=${IMMUTABLE}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create manifest list and push
        if: steps.filter.outputs.run == 'true'
        working-directory: ${{ runner.temp }}/digests
        shell: bash
        env:
          IMAGE: ${{ steps.meta.outputs.image }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          shopt -s nullglob
          digest_files=( * )
          if [[ ${#digest_files[@]} -eq 0 ]]; then
            echo "no digest files found under ${PWD}; build matrix produced nothing to merge" >&2
            exit 1
          fi

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] && tag_args+=( -t "${tag}" )
          done <<< "${TAGS}"

          digest_args=()
          for f in "${digest_files[@]}"; do
            digest_args+=( "${IMAGE}@sha256:${f}" )
          done

          echo "Creating manifest list:"
          printf '  %s\n' "${tag_args[@]}"
          echo "From digests:"
          printf '  %s\n' "${digest_args[@]}"

          docker buildx imagetools create "${tag_args[@]}" "${digest_args[@]}"

      - name: Inspect image and summarize
        if: steps.filter.outputs.run == 'true'
        shell: bash
        env:
          IMMUTABLE: ${{ steps.meta.outputs.immutable }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          inspect_out="$(docker buildx imagetools inspect "${IMMUTABLE}")"
          echo "${inspect_out}"

          # Pull architectures out of the inspect output; format is e.g.
          #   Platform:    linux/amd64
          archs="$(echo "${inspect_out}" \
            | awk '/^[[:space:]]*Platform:/ {print $2}' \
            | sort -u \
            | paste -sd ', ' -)"

          {
            echo "### ${{ matrix.distro }} — psmdb-${{ matrix.psmdb_version }}"
            echo ""
            echo "Pushed tags:"
            echo '```'
            echo "${TAGS}"
            echo '```'
            echo ""
            echo "Architectures in manifest list: \`${archs:-unknown}\`"
            echo ""
            echo "Pull:"
            echo '```bash'
            echo "docker pull ${IMMUTABLE}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Aggregate job surfaces a single "all green" status check suitable for
  # branch protection; avoids requiring 36 build + 18 merge separate checks
  # to stay in sync.
  report:
    name: report
    needs: [build, merge]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Check matrix results
        shell: bash
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          MERGE_RESULT: ${{ needs.merge.result }}
        run: |
          echo "build matrix result: ${BUILD_RESULT}"
          echo "merge matrix result: ${MERGE_RESULT}"

          # `merge` is skipped on pull_request events (push=false there); treat
          # skipped as success so PR runs that only validate `build` still go
          # green. Any actual failure or cancellation in either job fails the
          # aggregate.
          fail=0
          if [[ "${BUILD_RESULT}" != "success" ]]; then
            echo "build matrix did not succeed"
            fail=1
          fi
          if [[ "${MERGE_RESULT}" != "success" && "${MERGE_RESULT}" != "skipped" ]]; then
            echo "merge matrix did not succeed"
            fail=1
          fi
          exit "${fail}"
