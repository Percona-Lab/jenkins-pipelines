- job:
    name: ps-test-mtr-fetcher
    project-type: pipeline
    description: |
        Work in progress, please ignore
        Do not edit this job through the web!
    concurrent: true
    properties:
        - build-discarder:
            artifact-days-to-keep: -1
            artifact-num-to-keep: 40
            days-to-keep: -1
            num-to-keep: 40
    pipeline-scm:
        scm:
            - git:
                url: https://github.com/Percona-Lab/jenkins-pipelines.git
                branches:
                    - 'ps-mtr-test-fetcher'
                wipe-workspace: true
        lightweight-checkout: true
        script-path: misc/ps-test-mtr-fetcher.groovy
    triggers:
      - timed: "H H * * *"
