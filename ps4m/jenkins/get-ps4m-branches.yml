- job:
    name: hetzner-ps4m-autobuild
    project-type: pipeline
    description: |
        Do not edit this job through the web!
        Check Percona Search for MongoDB (mongot) repo for new release branches to build packages
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/vorsel/jenkins-pipelines.git
            branches:
            - 'PSMDB-1945_psmdb.cd_add_mongot_build_pipelie'
            wipe-workspace: false
      lightweight-checkout: true
      script-path: ps4m/jenkins/get-ps4m-branches.groovy
    triggers:
      - timed: "H/15 * * * *"
