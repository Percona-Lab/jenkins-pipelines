- job:
    name: pdpxc-integration-pull-test
    project-type: pipeline
    description: |
        Do not edit this job through the web!
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/Percona-Lab/jenkins-pipelines.git
            branches:
            - 'pxco-integration-trigger'
            wipe-workspace: false
      lightweight-checkout: true
      script-path: pdpxc/pdpxc-integration-pull.groovy
    triggers:
      - timed: "H/15 * * * *"  # Runs every 5 minutes
