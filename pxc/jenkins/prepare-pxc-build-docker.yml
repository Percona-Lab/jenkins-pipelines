- job:
    name: prepare-pxc-build-docker-ecr
    project-type: pipeline
    description: |
        Prepare docker images for PXC builds.
        upload to AWS ECR: public.ecr.aws/e7j3v3n0/pxc-build
        Do not edit this job through the web!
    disabled: false
    concurrent: false
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/Percona-Lab/jenkins-pipelines.git
            branches:
            - 'master'
            wipe-workspace: false
      lightweight-checkout: true
      script-path: pxc/jenkins/prepare-pxc-build-docker.groovy
    properties:
    - build-discarder:
        days-to-keep: -1
        num-to-keep: 10
        artifact-days-to-keep: -1
        artifact-num-to-keep: 10
    parameters:
    - choice:
        name: ARCH
        choices:
        - "x86_64"
        - "aarch64"
        description: CPU architecture for images
