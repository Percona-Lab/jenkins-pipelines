# Jenkins Job Builder definitions for the ARM64 test tree (branch: pmm-arm64-test).
#
# Registers all 11 test jobs in one shot:
#   jenkins-jobs --conf jenkins_jobs.ini update pmm/v3/test-jobs-jjb.yml
# Render locally without touching Jenkins:
#   jenkins-jobs test pmm/v3/test-jobs-jjb.yml
# Remove everything when testing is finished:
#   jenkins-jobs --conf jenkins_jobs.ini delete \
#     pmm3-server-autobuild-test pmm3-server-autobuild-amd-test pmm3-server-autobuild-arm-test \
#     pmm3-watchtower-autobuild-test pmm3-api-tests-test pmm3-image-scanning-test \
#     pmm3-aws-staging-start-test pmm3-package-testing-test pmm3-package-testing-arm-test \
#     pmm3-package-testing-matrix-test pmm3-package-testing-arm-matrix-test
#
# Notes:
# - Parameters are defined inside the pipeline scripts (parameters {} blocks), so the
#   very first run of each job executes with defaults; the parameter form appears
#   from the second run on. Trigger leaf jobs via the parent/matrix jobs, or run
#   each once to materialize the parameters.
# - No triggers/cron are defined anywhere: these jobs only run when started manually.

- job:
    name: pmm3-server-autobuild-test
    project-type: pipeline
    description: 'ARM64 TEST: multi-arch fan-out parent (amd64+arm64 -> manifest). Managed by JJB, branch pmm-arm64-test. Do not edit through the web!'
    concurrent: false
    properties:
      - build-discarder:
          num-to-keep: 30
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/Percona-Lab/jenkins-pipelines.git
            branches:
              - 'pmm-arm64-test'
      script-path: pmm/v3/pmm3-server-autobuild.groovy
      lightweight-checkout: true

