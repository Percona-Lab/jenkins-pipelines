# aws cloudformation --region us-west-1 create-stack --template-body file://IaC/ps.cd/JenkinsStack.yml_ps3 --capabilities CAPABILITY_NAMED_IAM --stack-name jenkins-ps3 --tags Key=iit-billing-tag,Value=jenkins-ps3
---
AWSTemplateFormatVersion: 2010-09-09
Parameters:

  JHostName:
    Default: ps3.cd.percona.com
    Description: Fully Qualified Domain Name
    Type: String
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '^[a-z][a-z0-9\.\-]*$'
    ConstraintDescription: must begin with a letter and must contain only lowercase letters, numbers, periods (.), and dashes (-).

  JShortName:
    Default: jenkins-ps3
    Description: Short host name
    Type: String
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '^[a-z][a-z0-9\.\-]*$'
    ConstraintDescription: must begin with a letter and must contain only lowercase letters, numbers, periods (.), and dashes (-).

  ZoneId:
    Default: Z1H0AFAU7N8IMC
    Description: Hosted Zone ID
    Type: AWS::Route53::HostedZone::Id

  MasterKeyName:
    Default: percona-jenkins
    Description: Key pair name
    Type: AWS::EC2::KeyPair::KeyName

  CacheBucketName:
    Default: ps-build-cache
    Description: Fully Qualified Domain Name
    Type: String
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '^[a-z][a-z0-9\.\-]*$'
    ConstraintDescription: must begin with a letter and must contain only lowercase letters, numbers, periods (.), and dashes (-).

Mappings:
  AmazonLinux2023:
    eu-west-1:
      x64: ami-0c27e7b62088f2235
    eu-central-1:
      x64: ami-0caadd9d179fc9c54

Resources:

  JVPC: # separate virtual network for jenkins instances
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.177.0.0/22
      EnableDnsSupport: true
      EnableDnsHostnames: true
      InstanceTenancy: default
      Tags:
      - Key: Name
        Value: !Ref JShortName
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JInternetGateway: # Internet Gateway for jenkins VPC
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
      - Key: Name
        Value: !Ref JShortName
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JVPCGatewayAttachment: # Attach Gateway to VPC
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref JVPC
      InternetGatewayId: !Ref JInternetGateway

  JSubnetB: # create subnet in AZ
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref JVPC
      CidrBlock: 10.177.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select: [ 1, !GetAZs '' ]
      Tags:
      - Key: Name
        Value: !Join [ '-', [ !Ref JShortName, 'B' ]]
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JSubnetC: # create subnet in AZ
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref JVPC
      CidrBlock: 10.177.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone:
        Fn::Select: [ 2, !GetAZs '' ]
      Tags:
      - Key: Name
        Value: !Join [ '-', [ !Ref JShortName, 'C' ]]
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JRouteTable: # create route table for VPC
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref JVPC
      Tags:
      - Key: Name
        Value: !Ref JShortName
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JInternetRoute: # add default route
    Type: AWS::EC2::Route
    Properties:
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref JInternetGateway
      RouteTableId: !Ref JRouteTable

  SubnetBRouteTable: # add subnet route
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref JRouteTable
      SubnetId: !Ref JSubnetB

  SubnetCRouteTable: # add subnet route
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref JRouteTable
      SubnetId: !Ref JSubnetC

  S3Endpoint: # route S3 traffic over private network
    Type: AWS::EC2::VPCEndpoint
    Properties:
      PolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal: '*'
            Action:
            - s3:ListBucket
            - s3:GetObject
            - s3:GetObjectAcl
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:DeleteObject
            - s3:AbortMultipartUpload
            Resource:
            - '*'
      RouteTableIds:
        - !Ref JRouteTable
      ServiceName: !Join
        - ''
        - - com.amazonaws.
          - !Ref 'AWS::Region'
          - .s3
      VpcId: !Ref JVPC

  TerminationQueue: # queue for termination notifications
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Join [ '-', [ !Ref JShortName, 'termination' ]]

  TerminationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TerminationQueue
      PolicyDocument:
        Id: sqspolicy
        Statement:
          - Sid: First
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource:
            - !GetAtt TerminationQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt TerminationRule1.Arn

  TerminationRule1: # notify about instance interruption from aws side
    Type: AWS::Events::Rule
    Properties:
      Description: EC2 Spot Instance Interruption Warning
      EventPattern:
        source:
          - aws.ec2
        detail-type:
          - EC2 Spot Instance Interruption Warning
      State: ENABLED
      Targets:
        - Arn: !GetAtt TerminationQueue.Arn
          Id: !GetAtt TerminationQueue.QueueName

  SSHSecurityGroup: # allow ssh access (assign when needed)
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: SSH
      GroupDescription: SSH traffic in
      VpcId: !Ref JVPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 176.37.55.60/32
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 188.163.20.103/32
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 213.159.239.48/32
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 46.149.86.84/32
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 54.214.47.252/32
      - IpProtocol: tcp
        FromPort: 22
        ToPort: 22
        CidrIp: 54.214.47.254/32
      Tags:
      - Key: iit-billing-tag
        Value: !Ref JShortName

  HTTPSecurityGroup: # allow http/https public access + :8080 from EKS NAT
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: HTTP
      # GroupDescription is immutable on AWS::EC2::SecurityGroup; do not
      # edit or CF will Replacement-recreate the SG. PS-10945 :8080 rule
      # below is added via SecurityGroupIngress (no replacement).
      GroupDescription: HTTP and HTTPS traffic in
      VpcId: !Ref JVPC
      SecurityGroupIngress:
      - IpProtocol: tcp
        FromPort: 80
        ToPort: 80
        CidrIp: 0.0.0.0/0
      - IpProtocol: tcp
        FromPort: 443
        ToPort: 443
        CidrIp: 0.0.0.0/0
      # PS-10945: jenkins-ingress nginx proxy in percona-ci-platform EKS
      # (us-east-1, NAT GW nat-07fa1058bd856dd8a) proxy_passes to Jenkins on
      # :8080. Removed in cleanup PR once openresty is stripped and Route53
      # cut over; at that point :443 + :80 close to the public and only the
      # NAT EIP keeps ingress to :8080.
      - IpProtocol: tcp
        FromPort: 8080
        ToPort: 8080
        CidrIp: 54.156.234.228/32
      Tags:
      - Key: iit-billing-tag
        Value: !Ref JShortName

  JWorkerRole: # create Role for jenkins workers (needed for assign tags)
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Join [ '-', [ !Ref JShortName, 'worker' ]]
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
        - Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: ec2.amazonaws.com
      Path: /
      Policies:
      - PolicyName: !Join [ '-', [ !Ref JShortName, 'worker' ]]
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource: '*'
            Action:
            - ec2:CreateTags
            - ec2:DeleteTags
            - ec2:DescribeInstances
            - ec2:DescribeSpotInstanceRequests
          - Effect: Allow
            Action:
            - s3:ListBucket
            - s3:GetObject
            - s3:GetObjectAcl
            - s3:PutObject
            - s3:PutObjectAcl
            - s3:DeleteObject
            - s3:AbortMultipartUpload
            Resource:
            - !Join [ '', [ 'arn:aws:s3:::', !Ref CacheBucketName ]]
            - !Join [ '', [ 'arn:aws:s3:::', !Ref CacheBucketName, '/*' ]]

  JWorkerProfile: # create Profile for jenkins workers (needed for assign tags)
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref JWorkerRole
      InstanceProfileName: !Join [ '-', [ !Ref JShortName, 'worker' ]]

  JMasterRole: # create Role for jenkins master (needed for run workers)
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Join [ '-', [ !Ref JShortName, 'master' ]]
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
        - Effect: Allow
          Action: sts:AssumeRole
          Principal:
            Service: ec2.amazonaws.com
      Path: /
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
      - PolicyName: StartInstances
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource: '*'
            Action:
            - ec2:ModifySpotFleetRequest
            - ec2:DescribeSpotFleetRequests
            - ec2:DescribeSpotFleetInstances
            - ec2:DescribeSpotInstanceRequests
            - ec2:CancelSpotInstanceRequests
            - ec2:GetConsoleOutput
            - ec2:RequestSpotInstances
            - ec2:RunInstances
            - ec2:StartInstances
            - ec2:StopInstances
            - ec2:TerminateInstances
            - ec2:CreateTags
            - ec2:DeleteTags
            - ec2:DescribeInstances
            - ec2:DescribeKeyPairs
            - ec2:DescribeRegions
            - ec2:DescribeImages
            - ec2:DescribeAvailabilityZones
            - ec2:DescribeSecurityGroups
            - ec2:DescribeSubnets
      - PolicyName: PassRole
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource:
            - !GetAtt JWorkerRole.Arn
            - !GetAtt JWorkerProfile.Arn
            Action:
            - iam:ListRoles
            - iam:PassRole
            - iam:ListInstanceProfiles
            - iam:ListInstanceProfilesForRole
      - PolicyName: UserDataNeeds
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource: '*'
            Action:
            - ec2:AttachVolume
            - ec2:DetachVolume
            - ec2:DescribeVolumes
            - ec2:AssociateAddress
            - ec2:CreateTags
            - ec2:DescribeInstances
      - PolicyName: ReadTerminationSQS
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource:
            - !GetAtt TerminationQueue.Arn
            Action:
            - sqs:GetQueueUrl
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:DeleteMessageBatch
      - PolicyName: AlloyGatewayBearerRead
        PolicyDocument:
          Version: 2012-10-17
          Statement:
          - Effect: Allow
            Resource: !Sub 'arn:aws:secretsmanager:us-east-1:${AWS::AccountId}:secret:percona-ci-platform/alloy-gateway/bearer-*'
            Action: secretsmanager:GetSecretValue

  JMasterProfile: # create Profile for jenkins master (needed for run workers)
    Type: AWS::IAM::InstanceProfile
    Properties:
      Path: /
      Roles:
        - !Ref JMasterRole
      InstanceProfileName: !Ref JShortName

  SpotFleetRole: # create Role for run jenkins master as spot instance
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Join [ '-', [ !Ref JShortName, 'SpotFleet' ]]
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole
      AssumeRolePolicyDocument:
        Version: 2008-10-17
        Statement:
        - Effect: Allow
          Principal:
            Service: spotfleet.amazonaws.com
          Action: sts:AssumeRole

  MasterIP: # create public IP for jenkins master
    Type: AWS::EC2::EIP
    DependsOn: JVPC
    Properties:
      Domain: vpc

  JDNSRecord: # create DNS record for jenkins master
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref ZoneId
      Name: !Ref JHostName
      Type: A
      TTL: 300
      ResourceRecords:
      - !Ref MasterIP

  JDataVolume: # create volume for jenkins data directory
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    Properties:
      AutoEnableIO: false
      AvailabilityZone:
        Fn::Select: [ 1, !GetAZs '' ]
      Encrypted: false
      Size: 100
      Tags:
      - Key: iit-billing-tag
        Value: !Ref JShortName
      - Key: Name
        Value: !Join [ ' ', [ !Ref JShortName, 'DATA, do not remove' ]]
      VolumeType: gp2

  JMasterInstance: # create jenkins master as spot instance
    Type: AWS::EC2::SpotFleet
    Properties:
      SpotFleetRequestConfigData:
        AllocationStrategy: capacityOptimized
        ExcessCapacityTerminationPolicy: default
        IamFleetRole: !GetAtt SpotFleetRole.Arn
        ReplaceUnhealthyInstances: true
        SpotPrice: 0.17
        TargetCapacity: 1
        TerminateInstancesWithExpiration: false
        Type: maintain
        LaunchTemplateConfigs:
        - LaunchTemplateSpecification:
            LaunchTemplateId: !Ref JMasterTemplate
            Version: !GetAtt JMasterTemplate.LatestVersionNumber
          Overrides:
          - InstanceType: c7i-flex.xlarge
            AvailabilityZone:
              Fn::Select: [ 1, !GetAZs '' ]
          - InstanceType: m7i-flex.xlarge
            AvailabilityZone:
              Fn::Select: [ 1, !GetAZs '' ]
          - InstanceType: c5a.xlarge
            AvailabilityZone:
              Fn::Select: [ 1, !GetAZs '' ]
          - InstanceType: c5d.xlarge
            AvailabilityZone:
              Fn::Select: [ 1, !GetAZs '' ]

  JMasterTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: PS3MasterTemplate
      LaunchTemplateData:
        NetworkInterfaces:
        - DeviceIndex: 0
          SubnetId: !Ref JSubnetB
          Groups:
          - !GetAtt JVPC.DefaultSecurityGroup
          - !GetAtt HTTPSecurityGroup.GroupId
          - !GetAtt SSHSecurityGroup.GroupId
        TagSpecifications:
        - ResourceType: instance
          Tags:
          - Key: Name
            Value: !Ref JShortName
          - Key: iit-billing-tag
            Value: !Ref JShortName
        - ResourceType: volume
          Tags:
          - Key: Name
            Value: !Ref JShortName
          - Key: iit-billing-tag
            Value: !Ref JShortName
        IamInstanceProfile:
            Arn: !GetAtt JMasterProfile.Arn
        EbsOptimized: true
        KeyName: !Ref MasterKeyName
        ImageId: !FindInMap [AmazonLinux2023, !Ref 'AWS::Region', x64]
        Monitoring:
          Enabled: false
        MetadataOptions:
          HttpTokens: "optional"  # Allows both IMDSv1 and IMDSv2
        UserData:
            Fn::Base64: !Sub |
              #!/bin/bash

              JENKINS_HOST=${JHostName}
              JENKINS_SHORT=${JShortName}
              JENKINS_EIP=${MasterIP.AllocationId}
              JENKINS_VOLUME_ID=${JDataVolume}
              INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id)
              INSTANCE_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/availability-zone | sed -e 's/[a-z]$//')

              set -o xtrace
              set -o errexit

              setup_aws() {
                  aws ec2 associate-address \
                      --region $INSTANCE_REGION \
                      --instance-id $INSTANCE_ID \
                      --allocation-id $JENKINS_EIP \
                      --allow-reassociation

                  SPOT_REQUEST=$(
                      aws ec2 describe-instances \
                          --region $INSTANCE_REGION \
                          --instance-ids $INSTANCE_ID \
                          --query 'Reservations[].Instances[].SpotInstanceRequestId' \
                          --output text
                  )

                  VOLUMES=$(
                      aws ec2 describe-instances \
                          --region $INSTANCE_REGION \
                          --instance-ids $INSTANCE_ID \
                          --query 'Reservations[].Instances[].BlockDeviceMappings[].Ebs.VolumeId' \
                          --output text
                  )

                  aws ec2 create-tags \
                      --resources $INSTANCE_ID $SPOT_REQUEST $VOLUMES \
                      --region $INSTANCE_REGION \
                      --tags Key=Name,Value=$JENKINS_SHORT \
                             Key=iit-billing-tag,Value=$JENKINS_SHORT
              }

              install_software() {
                  until yum makecache; do
                      sleep 1
                      echo try again
                  done

                  yum -y install yum-utils wget cronie rsync bc
                  # ps3 runs the current LTS line (2.541.x) to match the live
                  # plugin set on the EBS data volume; the rest of the fleet
                  # remains on jenkins-2.528.3 from redhat-stable-legacy.
                  wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
                  sed -i 's/^repo_gpgcheck=1/repo_gpgcheck=0/' /etc/yum.repos.d/jenkins.repo
                  grep -q 'repo_gpgcheck=0' /etc/yum.repos.d/jenkins.repo
                  rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2026.key
                  yum -y install java-17-amazon-corretto
                  yum -y update --security
                  yum -y install jenkins-2.541.3 git dnf-automatic aws-cli xfsprogs

                  sed -i 's/upgrade_type = default/upgrade_type = security/' /etc/dnf/automatic.conf
                  sed -i 's/apply_updates = no/apply_updates = yes/'         /etc/dnf/automatic.conf
                  echo "exclude=java-17-amazon-corretto* jenkins*" >> /etc/dnf/automatic.conf
                  systemctl enable --now dnf-automatic.timer
              }

              volume_state() {
                  aws ec2 describe-volumes \
                      --volume-id $JENKINS_VOLUME_ID \
                      --region $INSTANCE_REGION \
                      --query 'Volumes[].State' \
                      --output text
              }

              mount_data_partition() {
                  aws ec2 detach-volume \
                      --region $INSTANCE_REGION \
                      --volume-id $JENKINS_VOLUME_ID \
                      || :
                  while true; do
                      [ "x$(volume_state)" = "xavailable" ] && break || sleep 1
                  done

                  aws ec2 attach-volume \
                      --region $INSTANCE_REGION \
                      --device /dev/xvdj \
                      --instance-id $INSTANCE_ID \
                      --volume-id $JENKINS_VOLUME_ID
                  while true; do
                      [ "x$(volume_state)" = "xin-use" ] && break || sleep 1
                  done
                  while true; do
                      [ -e /dev/xvdj ] && break || sleep 1
                  done

                  mkfs.xfs -L DATA /dev/xvdj || :
                  echo "/dev/xvdj /mnt xfs defaults,noatime,nofail 0 0" | tee -a /etc/fstab
                  mount /mnt
              }

              start_jenkins() {
                  sysctl net.ipv4.tcp_fin_timeout=15
                  sysctl net.ipv4.tcp_tw_reuse=1
                  sysctl net.ipv6.conf.all.disable_ipv6=1
                  sysctl net.ipv6.conf.default.disable_ipv6=1
                  cat <<-EOF | tee /etc/security/limits.d/jenkins.conf
              		jenkins    soft    core      unlimited
              		jenkins    hard    core      unlimited
              		jenkins    soft    fsize     unlimited
              		jenkins    hard    fsize     unlimited
              		jenkins    soft    nofile    4096
              		jenkins    hard    nofile    8192
              		jenkins    soft    nproc     30654
              		jenkins    hard    nproc     30654
              	EOF

                  install -o jenkins -g jenkins -d /mnt/$JENKINS_HOST
                  install -o jenkins -g jenkins -d /mnt/$JENKINS_HOST/init.groovy.d
                  install -o jenkins -g jenkins -d /var/log/jenkins
                  chown -hR jenkins:jenkins /mnt/$JENKINS_HOST /var/log/jenkins

                  printf "127.0.0.1 $(hostname) $(hostname -A)\n10.30.6.220 vbox-01.ci.percona.com\n10.30.6.9 repo.ci.percona.com\n" \
                      | tee -a /etc/hosts
                  mkdir -p /etc/systemd/system/jenkins.service.d
                  cat <<-EOF | tee /etc/systemd/system/jenkins.service.d/override.conf
              		[Service]
              		TimeoutStartSec=600
              		# Directory where Jenkins stores its configuration and workspaces
              		Environment="JENKINS_HOME=/mnt/$JENKINS_HOST"
              		WorkingDirectory=/mnt/$JENKINS_HOST

              		# Location of the exploded WAR
              		Environment="JENKINS_WEBROOT=/var/cache/jenkins/war"

              		# Location of the Jenkins log.
              		Environment="JENKINS_LOG=/var/log/jenkins/jenkins.log"
              	EOF

                  cat <<-"EOF" | tee -a /etc/systemd/system/jenkins.service.d/override.conf

              		# Arguments for the Jenkins JVM
                        Environment="JAVA_OPTS=-Djava.awt.headless=true -Xms3072m -Xmx4096m -Xss4m -server -Dorg.jenkinsci.plugins.durabletask.BourneShellScript.HEARTBEAT_CHECK_INTERVAL=600"
              	EOF

                  systemctl daemon-reload
                  systemctl enable jenkins
                  systemctl start --no-block jenkins

                  #echo "/usr/bin/aws s3 sync --sse-kms-key-id alias/jenkins-pmm-backup --sse aws:kms --exclude '*/caches/*' --exclude '*/config-history/nodes/*' --exclude '*/secretFiles/*' --delete /mnt/ s3://backup.cd.percona.com/" > /etc/cron.daily/jenkins-backup
                  #chmod 755 /etc/cron.daily/jenkins-backup

                  printf "* * * * * root bash -c 'curl -s http://169.254.169.254/latest/meta-data/spot/instance-action | grep action && sh -c \"systemctl stop jenkins; cp /var/log/jenkins/jenkins.log /mnt/jenkins-latest.log; umount /mnt\" || :'\n* * * * * root sleep 30; bash -c 'curl -s http://169.254.169.254/latest/meta-data/spot/instance-action | grep action && sh -c \"systemctl stop jenkins; cp /var/log/jenkins/jenkins.log /mnt/jenkins-latest.log; umount /mnt\" || :'\n" > /etc/cron.d/terminate-check
              }

              setup_ssh_keys() {
                KEYS_LIST="evgeniy.patlan alex.miroshnychenko eduardo.casarero santiago.ruiz andrew.siemen vadim.yalovets surabhi.bhat talha.rizwan anderson.nogueira"

                for KEY in $KEYS_LIST; do
                    RETRY="3"
                    while [ $RETRY != "0" ]; do
                        STATUS=$(curl -Is https://www.percona.com/get/engineer/KEY/$KEY.pub | head -n1 | awk '{print $2}')
                        if [[ $STATUS -eq 200 ]]; then
                            curl -s https://www.percona.com/get/engineer/KEY/$KEY.pub | tee -a /home/ec2-user/.ssh/authorized_keys
                            RETRY="0"
                        elif [[ $STATUS -eq 404 ]]; then
                            echo "Skipping key $KEY"
                            RETRY=0
                        else
                            echo "Got $STATUS, retrying"
                            RETRY=$(($RETRY-1))
                        fi
                    done
                done
              }


              main() {
                  setup_aws
                  setup_ssh_keys
                  mount_data_partition
                  install_software
                  start_jenkins
                  curl -fsSL --retry 5 https://raw.githubusercontent.com/Percona-Lab/jenkins-pipelines/08df5f4e101e52d0e03a7e0062696ace909a86bc/scripts/install-master-observability.sh | JENKINS_HOST="$JENKINS_HOST" bash
              }

              main
              exit 0

Outputs:
  JIP:
    Description: Jenkins IP
    Value: !Ref MasterIP
  JMasterInstance:
    Description: Master Spot Fleet
    Value: !Ref JMasterInstance
