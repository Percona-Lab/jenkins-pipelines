- job:
    name: psmdb80-cache-warmup
    project-type: pipeline
    description: |
        Nightly Bazel cache warm-up for PSMDB 8.0.
        Checks if master and latest release branch have new commits,
        compiles on all platforms to populate S3 cache.
        Skips if cache is already up to date.
    pipeline-scm:
        scm:
            - git:
                url: https://github.com/Percona-Lab/jenkins-pipelines.git
                branches:
                    - 'cache_tests'
                wipe-workspace: false
        script-path: psmdb/jenkins/percona-server-for-mongodb-8.0-cache-warmup.groovy
    triggers:
        - timed: "0 0 * * *"
