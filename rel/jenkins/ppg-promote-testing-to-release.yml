- job:
    name: PPG-promote-testing-to-release
    project-type: pipeline
    description: |
        Do not edit this job through the web!
        Use this job to only sync PPG packages/tarballs from TESTING to RELEASE repo!
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/Percona-Lab/jenkins-pipelines.git
            branches:
            - 'hetzner'
            wipe-workspace: false
      lightweight-checkout: true
      script-path: rel/jenkins/ppg-promote-testing-to-release.groovy
