- job:
    name: hetzner-sign-and-upload-rpm
    project-type: pipeline
    description: |
        Do not edit this job through the web!
        Sign RPM packages on repo.ci.percona.com and push them to a public yum repository.
    pipeline-scm:
      scm:
        - git:
            url: https://github.com/surbhat1595/jenkins-pipelines.git
            branches:
            - 'PGhetzner'
            wipe-workspace: false
      lightweight-checkout: true
      script-path: rel/jenkins/sign-and-upload-rpm.groovy
