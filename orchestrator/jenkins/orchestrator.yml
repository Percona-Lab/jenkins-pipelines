- job:
    name: mysql-orchestrator-pipeline
    project-type: pipeline
    description: |
        Do not edit this job through the web!
    concurrent: true
    parameters:
    - string:
        name: GIT_REPO
        default: "https://github.com/percona/orchestrator"
        description: URL to the Orchestrator repository
    - string:
        name: BRANCH
        default: "master"
        description: Tag/Branch for the Orchestrator repository
    - string:
        name: PS_TARBALL
        default: "https://downloads.percona.com/downloads/Percona-Server-8.4/Percona-Server-8.4.7-7/binary/tarball/Percona-Server-8.4.7-7-Linux.x86_64.glibc2.35-minimal.tar.gz"
        description: PS tarball to be used for testing
    - string:
        name: CI_ENV_GIT_REPO
        default: "https://github.com/percona/orchestrator-ci-env.git"
        description: URL to the Orchestrator CI repository
    - string:
        name: CI_ENV_BRANCH
        default: "master"
        description: Tag/Branch for the Orchestrator CI repository
    - choice:
        name: CLOUD
        choices:
          - "Hetzner"
          - "AWS"
        description: "Host provider for Jenkins workers"
    - string:
        name: JENKINS_SCRIPTS_REPO
        default: "https://github.com/Percona-Lab/jenkins-pipelines.git"
        description: "Repo for the pipeline Groovy and the run-*-tests scripts under orchestrator/local. Override to test changes from a fork."
    - string:
        name: JENKINS_SCRIPTS_BRANCH
        default: "orchestrator"
        description: "Branch/tag of JENKINS_SCRIPTS_REPO to use"
    pipeline-scm:
      scm:
        - git:
            url: "${JENKINS_SCRIPTS_REPO}"
            branches:
            - "${JENKINS_SCRIPTS_BRANCH}"
            wipe-workspace: false
      lightweight-checkout: false
      script-path: orchestrator/jenkins/orchestrator-pipeline.groovy
